name: Build RecafMCP Plugin Jar
on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch: # 手动触发构建

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup JDK 22
        uses: actions/setup-java@v4
        with:
          java-version: 22
          distribution: temurin
          cache: gradle

      # 创建libs目录并下载recaf依赖
      - name: Prepare recaf.jar dependency
        run: |
          mkdir -p recaf-mcp-plugin/libs
          wget -O recaf-mcp-plugin/libs/recaf.jar https://github.com/Col-E/Recaf/releases/download/v4.0.0-SNAPSHOT/recaf.jar

      # 不切换子目录，在仓库根目录执行gradle，指定子项目打包
      - name: Build shadowJar
        run: ./gradlew :recaf-mcp-plugin:shadowJar --stacktrace

      # 上传产物
      - name: Upload Jar Artifact
        uses: actions/upload-artifact@v4
        with:
          name: RecafMCP-Plugin-Jar
          path: recaf-mcp-plugin/build/libs/*.jar
